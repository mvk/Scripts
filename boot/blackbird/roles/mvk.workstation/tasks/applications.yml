---
# tasks file for mvk.workstation

- name: Install apt-transport-https
  ansible.builtin.apt:
    name: apt-transport-https
    state: present
    update_cache: true

- name: Add Apt signing key
  ansible.builtin.apt_key:
    url: "https://dl.google.com/linux/linux_signing_key.pub"
    state: present
- name: Add repository into sources list
  ansible.builtin.apt_repository:
    repo: deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main
    state: present
    filename: google-chrome

- name: Install google-chrome-stable
  ansible.builtin.apt:
    name: google-chrome-stable
    state: present
    update_cache: true

- name: Install sublime key
  ansible.builtin.shell: |
    wget -qO - https://download.sublimetext.com/sublimehq-pub.gpg | \
      gpg --dearmor | \
      sudo tee /etc/apt/trusted.gpg.d/sublimehq-archive.gpg > /dev/null

- name: Configure sublime repository
  ansible.builtin.apt_repository:
    repo: deb https://download.sublimetext.com/ apt/stable/
    state: present
    filename: sublime-text

- name: Install sublime packages
  ansible.builtin.apt:
    pkg:
      - sublime-text
      - sublime-merge
    state: present
    update_cache: true

- name: Install docker prerequisites
  ansible.builtin.apt:
    pkg:
      - ca-certificates
      - curl
      - gnupg
      - lsb-release

- name: Install docker repo key
  ansible.builtin.shell: |
    curl -fsSL https://download.docker.com/linux/ubuntu/gpg | \
      sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/docker.gpg

- name: Setup docker repository
  ansible.builtin.apt_repository:
    repo: deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu \
  $(lsb_release -cs) stable
    state: present
    filename: docker

- name: Install docker packages
  ansible.builtin.apt:
    pkg:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: present
    update_cache: true


